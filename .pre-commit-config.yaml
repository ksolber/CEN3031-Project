repos:
  - repo: local
    hooks:
      - id: python-format
        name: python-format
        entry: uv run task format
        language: system
        types: [python]
        pass_filenames: false

      - id: python-lint
        name: python-lint
        entry: uv run task lint
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-tidy
        args: ["-p=build"]
        types_or: [c++, c]