# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#jobs-overview & https://circleci.com/docs/reference/configuration-reference/#jobs
jobs:
  build-and-test:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout
      
      - run:
          name: Install C++ and CMake dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y build-essential g++ make cmake clang-format clang-tidy
      
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> "$BASH_ENV"
            source "$BASH_ENV"

      - run:
          name: Setup Python environment
          command: |
            uv venv || true
            uv sync
            echo 'export PATH="./.venv/bin:$PATH"' >> "$BASH_ENV"
            source "$BASH_ENV"

      - run:
          name: Configure CMake project
          command: |
            mkdir build
            cd build
            cmake ..

      - run:
          name: Build C++ Project
          command: |
            cd build
            cmake --build .

      - run:
          name: Run Format Checks (C++ and Python)
          command: |
            cd build
            cmake --build . --target check_format

      - run:
          name: Run Lint Checks (C++ and Python)
          command: |
            cd build
            cmake --build . --target lint

workflows:
  build-and-test-workflow:
    jobs:
      - build-and-test
