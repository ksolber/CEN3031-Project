version: 2.1

jobs:
  build-and-test:
    docker:
      # cimg/python includes basic C++ compilers and python, perfect for this project
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Install System Dependencies (C++)
          command: |
            sudo apt-get update
            sudo apt-get install -y cmake build-essential wget gnupg
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
            echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update
            sudo apt-get install -y clang-format-17 clang-tidy-17
            sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-17 100
            sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-17 100

      - run:
          name: Install uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh

      - run:
          name: Configure CMake
          command: cmake -B build -S .

      - run:
          name: Check Format & Lint (Python & C++)
          command: |
            export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
            uv run pre-commit run --all-files

      - run:
          name: Build C++ Project
          command: cmake --build build

      - run:
          name: Run C++ Tests
          command: cd build && ctest --output-on-failure

workflows:
  build-and-test-workflow:
    jobs:
      - build-and-test
